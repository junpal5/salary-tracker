// ══════════ 2026 4대보험 요율 ══════════
const NPS=0.0475,NPS_CAP=6370000,NPS_FL=390000;
const HI_R=0.03595,LTC_R=0.1314,EI_R=0.009;
const BRACKETS=[[14e6,0.06],[50e6,0.15],[88e6,0.24],[150e6,0.35],[300e6,0.38],[500e6,0.40],[1e9,0.42],[Infinity,0.45]];
const BC=["#6c9fff","#818cf8","#a78bfa","#c084fc","#e879f9","#f472b6","#fb7185","#f87171"];
const DC=["#6c9fff","#818cf8","#a78bfa","#c084fc","#fb923c","#fbbf24"];
const C={accent:"#6c9fff",green:"#4ade80",red:"#f87171",gold:"#fbbf24",purple:"#a78bfa",teal:"#2dd4bf",orange:"#fb923c",pink:"#f472b6",muted:"#9ca3af",dim:"#6b7280",text:"#e8eaed",bg:"#0f1117",card:"#1a1d27",border:"#2a2d3a"};

// ══════════ 급여 계산 (연봉 → 월 실수령) ══════════
function eid(p){if(p<=5e6)return p*0.7;if(p<=15e6)return 35e5+(p-5e6)*0.4;if(p<=45e6)return 75e5+(p-15e6)*0.15;if(p<=1e8)return 12e6+(p-45e6)*0.05;return 1475e4+(p-1e8)*0.02;}
function txCr(t){return t<=5e5?t*0.55:275e3+(t-5e5)*0.3}
function txCrLim(p){if(p<=33e6)return 74e4;if(p<=70e6)return 74e4-(p-33e6)*0.008;return Math.max(5e5-(p-70e6)*0.5,2e5)}
function calc(sal){
  const m=sal/12,nb=Math.min(Math.max(m,NPS_FL),NPS_CAP);
  const nps=Math.floor(nb*NPS/10)*10,hi=Math.floor(m*HI_R/10)*10;
  const ltc=Math.floor(hi*LTC_R/10)*10,ei=Math.floor(m*EI_R/10)*10;
  const tIns=nps+hi+ltc+ei,d=eid(sal),taxable=Math.max(sal-d-15e5,0);
  let aT=0,det=[],prev=0;
  for(const[lim,rate]of BRACKETS){if(taxable<=prev)break;const chunk=Math.min(taxable,lim)-prev;const t=chunk*rate;det.push({rate,tax:t});aT+=t;prev=lim;}
  const cr=Math.min(txCr(aT),txCrLim(sal))+13e4,fT=Math.max(aT-cr,0);
  const mI=Math.floor(fT/12/10)*10,mL=Math.floor(mI*0.1/10)*10,tD=tIns+mI+mL;
  return{nps,hi,ltc,ei,tIns,mI,mL,tD,net:m-tD,aNet:(m-tD)*12,eff:sal>0?(tD*12/sal)*100:0,taxable,aT,cr,fT,det};
}

// 만원 단위 연봉 → 상세 공제 (성장 트래커용)
function calcNet(salManWon,nonTax=200000){
  const ann=salManWon*10000,m=ann/12,tm=Math.max(m-nonTax,0),ta=tm*12;
  const npB=Math.min(Math.max(tm,NPS_FL),NPS_CAP);
  const np=Math.floor(npB*NPS),hi=Math.floor(tm*HI_R),ltc=Math.floor(hi*LTC_R),ei=Math.floor(tm*EI_R);
  const tIns=np+hi+ltc+ei,tInsA=tIns*12;
  const eidV=eid(ta),earnInc=Math.max(ta-eidV,0),txBase=Math.max(earnInc-15e5-tInsA,0);
  let inTax=0;const bk=[[14e6,0.06,0],[50e6,0.15,126e4],[88e6,0.24,576e4],[150e6,0.35,1544e4],[300e6,0.38,1994e4],[500e6,0.40,2594e4],[1e9,0.42,3594e4],[Infinity,0.45,6594e4]];
  for(const[l,r,d]of bk){if(txBase<=l){inTax=txBase*r-d;break;}}
  inTax=Math.max(inTax,0);
  let cr2;if(inTax<=13e5)cr2=inTax*0.55;else cr2=715e3+(inTax-13e5)*0.3;
  let crLim;if(ta<=33e6)crLim=74e4;else if(ta<=70e6)crLim=66e4;else crLim=5e5;
  cr2=Math.min(cr2,crLim);
  const fin=Math.max(inTax-cr2,0),loc=Math.floor(fin*0.1),mIT=Math.floor(fin/12),mLT=Math.floor(loc/12);
  const tD=tIns+mIT+mLT;
  return{gross:m,np,hi,ltc,ei,tIns,mIT,mLT,tD,net:Math.floor(m-tD),nonTax};
}

// ══════════ 재정목표 계산 ══════════
function goalCalc(sav,inv,ret,goal,curCash,curInv){
  if(goal<=0)return{mo:0,data:[]};const mr=ret/100/12;
  let ps=(curCash||0),ip=(curInv||0),mo=0,tot=ps+ip;
  if(tot>=goal)return{mo:0,data:[{m:0,t:tot,s:ps,i:ip}]};
  if(sav+inv<=0&&ret<=0)return{mo:Infinity,data:[]};
  const data=[{m:0,t:Math.round(tot),s:Math.round(ps),i:Math.round(ip)}];
  while(tot<goal&&mo<1200){mo++;ps+=sav;ip+=inv;ip+=ip*mr;tot=ps+ip;
    if(mo%(mo<=24?1:mo<=120?3:6)===0||tot>=goal)data.push({m:mo,t:Math.round(tot),s:Math.round(ps),i:Math.round(ip)});}
  if(tot<goal)return{mo:Infinity,data};return{mo,data};
}

// ══════════ 역산 계산 ══════════
function reverseCalc(goal,months,ret,curCash,curInv,invRatio){
  if(months<=0||goal<=0)return{monthly:0,savPart:0,invPart:0,finalSav:0,finalInv:0};
  const mr=ret/100/12;let eg=curInv||0;for(let i=0;i<months;i++)eg+=eg*mr;
  const rem=goal-(curCash||0)-eg;
  if(rem<=0)return{monthly:0,savPart:0,invPart:0,finalSav:(curCash||0),finalInv:eg};
  const ratio=(invRatio||50)/100;let lo=0,hi=rem;
  for(let it=0;it<100;it++){const mid=(lo+hi)/2,mS=mid*(1-ratio),mI2=mid*ratio;
    let ps=(curCash||0),ip=(curInv||0);for(let m=0;m<months;m++){ps+=mS;ip+=mI2;ip+=ip*mr;}
    if(ps+ip>=goal)hi=mid;else lo=mid;}
  const monthly=Math.ceil((lo+hi)/2/1000)*1000,mSav=Math.round(monthly*(1-ratio)),mInv=monthly-mSav;
  let fS=(curCash||0),fI=(curInv||0);for(let m=0;m<months;m++){fS+=mSav;fI+=mInv;fI+=fI*mr;}
  return{monthly,savPart:mSav,invPart:mInv,finalSav:Math.round(fS),finalInv:Math.round(fI)};
}

// ══════════ 포맷 ══════════
const f=n=>Math.round(n).toLocaleString("ko-KR");const fw=n=>f(n)+"원";
function sl(v){if(v>=1e8)return(v/1e8).toFixed(v%1e8===0?0:1)+"억원";return(v/1e4).toLocaleString("ko-KR")+"만원";}
function fk(n){if(Math.abs(n)>=1e8)return(n/1e8).toFixed(1).replace(/\.0$/,"")+"억";if(Math.abs(n)>=1e4)return(n/1e4).toFixed(0)+"만";return n.toLocaleString();}
function fm(m){if(m===Infinity||isNaN(m)||m<=0)return null;const y=Math.floor(m/12),mo=Math.ceil(m%12);if(!y)return`${mo}개월`;if(!mo)return`${y}년`;return`${y}년 ${mo}개월`;}
const fPct=n=>(n>=0?"+":"")+n.toFixed(1)+"%";

// ══════════ 공용 컴포넌트 ══════════
function GrowthChart({data,goal:g}){
  if(!data||data.length<2)return null;
  const W=520,H=170,PX=44,PY=20,PB=28,cW=W-PX*2,cH=H-PY-PB;
  const mM=data[data.length-1].m||1,mV=Math.max(g,...data.map(d=>d.t))*1.05;
  const x=m=>PX+(m/mM)*cW,y=v=>PY+cH-(v/mV)*cH;
  const tp=data.map((d,i)=>`${i?"L":"M"}${x(d.m)},${y(d.t)}`).join(" ");
  const sp2=data.map((d,i)=>`${i?"L":"M"}${x(d.m)},${y(d.s)}`).join(" ");
  const ar=tp+` L${x(data[data.length-1].m)},${y(0)} L${x(0)},${y(0)} Z`;
  const tk=Array.from({length:5},(_,i)=>Math.round((mV/4)*i));
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6c9fff" stopOpacity="0.18"/><stop offset="100%" stopColor="#6c9fff" stopOpacity="0.01"/></linearGradient></defs>
    {tk.map(t=><g key={t}><line x1={PX} y1={y(t)} x2={W-PX} y2={y(t)} stroke="#2a2d3a" strokeWidth="1"/><text x={PX-6} y={y(t)+4} textAnchor="end" fontSize="8.5" fill="#6b7280" fontFamily="sans-serif">{fk(t)}</text></g>)}
    <line x1={PX} y1={y(g)} x2={W-PX} y2={y(g)} stroke="#f87171" strokeWidth="1" strokeDasharray="5,4" opacity="0.6"/>
    <text x={W-PX+4} y={y(g)+3} fontSize="8.5" fill="#f87171" fontWeight="600">목표</text>
    <path d={ar} fill="url(#ag)"/><path d={sp2} fill="none" stroke="#4ade80" strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>
    <path d={tp} fill="none" stroke="#6c9fff" strokeWidth="2.5" strokeLinecap="round"/>
    <circle cx={x(data[data.length-1].m)} cy={y(data[data.length-1].t)} r="3.5" fill="#6c9fff"/>
    <text x={W/2} y={H-3} textAnchor="middle" fontSize="9" fill="#6b7280">경과 기간 (개월)</text>
    <g transform={`translate(${PX+6},${PY+8})`}><line x1="0" y1="0" x2="12" y2="0" stroke="#6c9fff" strokeWidth="2.5"/><text x="16" y="3" fontSize="8" fill="#9ca3af">총 자산</text>
    <line x1="60" y1="0" x2="72" y2="0" stroke="#4ade80" strokeWidth="1.5"/><text x="76" y="3" fontSize="8" fill="#9ca3af">순 저축</text></g>
  </svg>);
}

function Donut({items,center}){
  const tot=items.reduce((s,x)=>s+x.a,0);if(tot<=0)return null;
  const R=70,r2=44,cx=90,cy=90;let cum=0;
  const arcs=items.map(x=>{const frac=x.a/tot;const sa=cum*2*Math.PI-Math.PI/2;cum+=frac;const ea=cum*2*Math.PI-Math.PI/2;const lg=frac>0.5?1:0;
    const d=frac>=0.9999?`M${cx-R},${cy}A${R},${R},0,1,1,${cx+R},${cy}A${R},${R},0,1,1,${cx-R},${cy}Z M${cx-r2},${cy}A${r2},${r2},0,1,0,${cx+r2},${cy}A${r2},${r2},0,1,0,${cx-r2},${cy}Z`
    :`M${cx+R*Math.cos(sa)},${cy+R*Math.sin(sa)}A${R},${R},0,${lg},1,${cx+R*Math.cos(ea)},${cy+R*Math.sin(ea)}L${cx+r2*Math.cos(ea)},${cy+r2*Math.sin(ea)}A${r2},${r2},0,${lg},0,${cx+r2*Math.cos(sa)},${cy+r2*Math.sin(sa)}Z`;
    return{...x,d,frac};});
  return(<div style={{display:"flex",alignItems:"center",gap:20}}>
    <div style={{position:"relative",width:180,height:180,flexShrink:0}}>
      <svg viewBox="0 0 180 180" style={{width:"100%",height:"100%"}}>{arcs.map((a,i)=><path key={i} d={a.d} fill={a.c} opacity="0.85" stroke="#1a1d27" strokeWidth="2"/>)}</svg>
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
        <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>{center||"합계"}</div>
        <div style={{fontSize:15,fontWeight:700,color:"#e8eaed"}}>{fk(tot)}원</div></div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10,flex:1}}>
      {arcs.map((x,i)=>(<div key={i}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:x.c,flexShrink:0}}/><span style={{fontSize:12,color:"#9ca3af"}}>{x.l}</span>
        <span style={{fontSize:11,fontWeight:600,color:x.c,marginLeft:"auto"}}>{(x.frac*100).toFixed(1)}%</span></div>
        <div style={{fontSize:13,fontWeight:600,color:"#e8eaed",paddingLeft:14}}>{fk(x.a)}원</div></div>))}
    </div>
  </div>);
}

function SalSlider({value,onChange,min,max,step}){
  const steps=Math.round((max-min)/step),idx=Math.round((value-min)/step),pct=(idx/steps)*100;
  return <input type="range" min={0} max={steps} step={1} value={idx}
    style={{background:`linear-gradient(to right,#6c9fff ${pct}%,#2a2d3a ${pct}%)`}}
    onChange={e=>onChange(min+Number(e.target.value)*step)}/>;
}

// ══════════ 성장 트래커 라인 차트 ══════════
function LineChart({records,dataKey,color,label,formatter,height=180,nonTaxVal}){
  if(records.length<2)return null;
  const values=records.map(r=>dataKey==="net"?calcNet(r.salary,nonTaxVal).net:r.salary);
  const min=Math.min(...values)*0.92,max=Math.max(...values)*1.05,range=max-min||1;
  const pad={top:30,right:20,bottom:36,left:16},w=100,h=100;
  const points=values.map((v,i)=>({x:pad.left+(i/(values.length-1))*(w-pad.left-pad.right),y:pad.top+(1-(v-min)/range)*(h-pad.top-pad.bottom),value:v,year:records[i].year}));
  const pathD=points.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
  const areaD=pathD+` L ${points[points.length-1].x} ${h-pad.bottom} L ${points[0].x} ${h-pad.bottom} Z`;
  return(<div style={{marginBottom:8}}>
    <div style={{fontSize:12,fontWeight:600,color:C.muted,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
      <span style={{width:10,height:10,borderRadius:"50%",background:color,display:"inline-block"}}/>{label}</div>
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,overflow:"visible"}}>
      <defs><linearGradient id={`grad-${dataKey}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0.02"/></linearGradient></defs>
      <path d={areaD} fill={`url(#grad-${dataKey})`}/><path d={pathD} fill="none" stroke={color} strokeWidth="0.8" strokeLinejoin="round"/>
      {points.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r="1.5" fill={C.bg} stroke={color} strokeWidth="0.7"/>
        <text x={p.x} y={p.y-4} textAnchor="middle" fill={C.text} fontSize="3.5" fontWeight="600">{formatter(p.value)}</text>
        <text x={p.x} y={h-pad.bottom+8} textAnchor="middle" fill={C.muted} fontSize="3.2">{String(p.year).slice(-2)}년</text></g>))}
    </svg>
  </div>);
}

// ══════════ 메인 앱 ══════════
const LEGACY_SK="salary-planner-v1",LEGACY_TK="salary-records-v2";
function scopeKeys(scope){
  return{planner:`salary-planner-v2:${scope}:planner`,records:`salary-planner-v2:${scope}:records`};
}
function ldP(scope){try{return JSON.parse(localStorage.getItem(scopeKeys(scope).planner))||{}}catch{return{}}}
function ldR(scope){try{return JSON.parse(localStorage.getItem(scopeKeys(scope).records))||[]}catch{return[]}}
function readLegacySnapshot(){
  try{
    return{
      planner:JSON.parse(localStorage.getItem(LEGACY_SK))||{},
      records:JSON.parse(localStorage.getItem(LEGACY_TK))||[]
    };
  }catch{return{planner:{},records:[]}}
}
function readLocalSnapshot(scope){return{planner:ldP(scope),records:ldR(scope)}}
function writeLocalSnapshot(scope,snapshot){
  const keys=scopeKeys(scope);
  try{
    localStorage.setItem(keys.planner,JSON.stringify(snapshot?.planner||{}));
    localStorage.setItem(keys.records,JSON.stringify(snapshot?.records||[]));
  }catch{}
}
function clearLocalSnapshot(scope){
  const keys=scopeKeys(scope);
  try{
    localStorage.removeItem(keys.planner);
    localStorage.removeItem(keys.records);
  }catch{}
}
function hasSnapshotContent(snapshot){
  return !!(snapshot&&((snapshot.records&&snapshot.records.length)||Object.keys(snapshot.planner||{}).length));
}

function App({storageScope,onCloudSnapshotChange,onCloudRefresh,onCloudLogout,cloudStatus,cloudEmail,cloudMessage}){

  const[sal,setSal]=useState(saved.sal??50000000);

  const[sav,setSav]=useState(saved.sav??500000);
  const[inv,setInv]=useState(saved.inv??300000);
  const[ret,setRet]=useState(saved.ret??7);
  const[goal,setGoal]=useState(saved.goal??100000000);
  const[curCash,setCurCash]=useState(saved.curCash??5000000);
  const[curInv,setCurInv]=useState(saved.curInv??5000000);
  const[rGoal,setRGoal]=useState(saved.rGoal??100000000);
  const[rYears,setRYears]=useState(saved.rYears??5);
  const[rRet,setRRet]=useState(saved.rRet??7);
  const[rCash,setRCash]=useState(saved.rCash??5000000);

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div className="card" style={{padding:12,textAlign:"center"}}>

      {records.length>=2&&(<div className="card" style={{padding:"16px 12px",marginBottom:16}}>

        <div style={{height:12}}/>
        <LineChart records={records} dataKey="net" color={C.teal} label="월 실수령액 (원)" nonTaxVal={nonTaxVal}
          formatter={v=>f(v/10000)+"만"} height={160}/>

      {records.length>0&&(<div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:13,fontWeight:600,color:C.muted}}>연봉 기록 ({records.length}건)</div>

        </div>
        {records.map((rc,i)=>{
          const pct=i>0?((rc.salary-records[0].salary)/records[0].salary)*100:null;
          const prevPct=i>0?((rc.salary-records[i-1].salary)/records[i-1].salary)*100:null;
          const dt=calcNet(rc.salary,nonTaxVal);const isExp=expandIdx===i;
          return(<div key={i} style={{marginBottom:8}}>
            <div style={{background:C.card,border:`1px solid ${isExp?C.accent+"55":C.border}`,borderRadius:isExp?"10px 10px 0 0":"10px",padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}
              onClick={()=>setExpandIdx(isExp?null:i)}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:36,height:36,borderRadius:8,background:i===0?C.gold+"15":C.accent+"15",border:`1px solid ${i===0?C.gold+"30":C.accent+"30"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:i===0?C.gold:C.accent}}>
                  {String(rc.year).slice(-2)}</div>
                <div><div style={{fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                  {f(rc.salary)}<span style={{fontSize:11,color:C.muted,fontWeight:400}}>만원</span>
                  {i===0&&<span style={{fontSize:9,color:C.gold,fontWeight:600,background:C.gold+"18",padding:"1px 6px",borderRadius:4}}>초봉</span>}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2,display:"flex",gap:8,flexWrap:"wrap"}}>
                    <span style={{color:C.teal}}>실수령 {f(dt.net)}원</span>
                    {pct!==null&&<span style={{color:pct>=0?C.green:C.red}}>초봉 대비 {fPct(pct)}</span>}</div></div>
              </div>
              <span style={{fontSize:14,color:C.muted,transform:isExp?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s"}}>▾</span>
            </div>
            {isExp&&(<div style={{background:C.card,border:`1px solid ${C.accent}55`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"14px 16px"}}>
              <div style={{fontSize:11,fontWeight:600,color:C.accent,marginBottom:10}}>2026년 세금 기준 공제 내역</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",fontSize:12}}>
                {[{l:"세전 월급",v:f(dt.gross)+"원",c:C.text},{l:"비과세액",v:f(dt.nonTax)+"원",c:C.muted},
                  {l:"국민연금",v:`-${f(dt.np)}원`,c:C.orange},{l:"건강보험",v:`-${f(dt.hi)}원`,c:C.orange},
                  {l:"장기요양보험",v:`-${f(dt.ltc)}원`,c:C.orange},{l:"고용보험",v:`-${f(dt.ei)}원`,c:C.orange},
                  {l:"소득세",v:`-${f(dt.mIT)}원`,c:C.purple},{l:"지방소득세",v:`-${f(dt.mLT)}원`,c:C.purple}].map((it,j)=>(
                  <div key={j} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${C.border}44`}}>
                    <span style={{color:C.muted}}>{it.l}</span><span style={{color:it.c,fontWeight:500}}>{it.v}</span></div>))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:10,padding:"8px 0 4px",borderTop:`1px solid ${C.border}`}}>
                <span style={{fontSize:12,fontWeight:600}}>총 공제액</span><span style={{fontSize:13,fontWeight:700,color:C.red}}>-{f(dt.tD)}원</span></div>
              <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}>
                <span style={{fontSize:13,fontWeight:700,color:C.teal}}>월 실수령액</span><span style={{fontSize:15,fontWeight:700,color:C.teal}}>{f(dt.net)}원</span></div>
              {prevPct!==null&&<div style={{fontSize:11,color:C.muted,marginTop:4,textAlign:"right"}}>전년 대비 연봉 {fPct(prevPct)}</div>}
              {rc.memo&&<div style={{fontSize:11,color:C.muted,marginTop:6}}>📝 {rc.memo}</div>}
              <div style={{display:"flex",gap:6,marginTop:12,justifyContent:"flex-end"}}>
                <button className="btn-sm" onClick={e=>{e.stopPropagation();handleEditRec(i)}} style={{background:C.accent+"18",borderColor:C.accent+"33",color:C.accent}}>수정</button>
                <button className="btn-sm" onClick={e=>{e.stopPropagation();handleDeleteRec(i)}} style={{background:C.red+"18",borderColor:C.red+"33",color:C.red}}>삭제</button>
              </div>
            </div>)}
          </div>);
        })}
      </div>)}

      {records.length===0&&!showForm&&(<div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
        <div style={{fontSize:36,marginBottom:10}}>📊</div>
        <div style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:4}}>아직 기록이 없습니다</div>
        <div style={{fontSize:12}}>아래 버튼을 눌러 첫 연봉을 입력해보세요</div></div>)}

      {showForm&&(<div className="card" style={{border:`1px solid ${C.accent}44`,padding:18,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>{editIdx!==null?"연봉 수정":records.length===0?"초봉 입력":"연봉 추가"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div><label style={{fontSize:10,color:C.muted,display:"block",marginBottom:3}}>연도</label>
            <input type="number" className="ti" placeholder="예: 2020" value={tYear} onChange={e=>setTYear(e.target.value)}/></div>
          <div><label style={{fontSize:10,color:C.muted,display:"block",marginBottom:3}}>연봉 (만원)</label>
            <input type="text" className="ti" placeholder="예: 3,000" value={tSal} onChange={e=>handleTSalInput(e.target.value)}/></div>
        </div>
        <div style={{marginBottom:12}}><label style={{fontSize:10,color:C.muted,display:"block",marginBottom:3}}>메모 (선택)</label>
          <input type="text" className="ti" placeholder="예: 승진, 이직 등" value={tMemo} onChange={e=>setTMemo(e.target.value)}/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-primary" onClick={handleSubmitRec}>{editIdx!==null?"수정 완료":"저장"}</button>
          <button onClick={cancelEdit} style={{padding:"10px 18px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>취소</button>
        </div>
      </div>)}

      {!showForm&&(<button className="btn-primary" onClick={()=>setShowForm(true)}>
        + {records.length===0?"초봉 입력하기":"연봉 추가하기"}</button>)}
    </>)}

    {/* 안내문 */}
    <div style={{fontSize:11.5,color:C.dim,lineHeight:1.7,padding:"16px 4px 0"}}>
      ※ 2026년 4대보험 요율 기준 (국민연금 9.5%, 건강보험 7.19%, 장기요양 13.14%)<br/>
      ※ 소득세는 근로소득공제·기본공제(150만)·세액공제·표준세액공제(13만) 적용 추정치입니다.<br/>
      ※ 투자 수익은 복리 계산이며, 세금·인플레이션은 미반영된 시뮬레이션입니다.
    </div>
  </div>);
}

function AccessShell(){
  const [authMode,setAuthMode]=useState("signin");
  const [authEmail,setAuthEmail]=useState("");
  const [authPassword,setAuthPassword]=useState("");
  const [authError,setAuthError]=useState("");
  const [authMessage,setAuthMessage]=useState("");
  const [authBusy,setAuthBusy]=useState(false);
  const [session,setSession]=useState(null);
  const [authReady,setAuthReady]=useState(!isSupabaseConfigured());
  const [cloudStatus,setCloudStatus]=useState(isSupabaseConfigured()?"연결 대기":"설정 필요");
  const [cloudMessage,setCloudMessage]=useState(isSupabaseConfigured()?"로그인 필요":"Supabase URL/Anon Key 입력 필요");
  const [appVersion,setAppVersion]=useState(0);
  const [showImportChoice,setShowImportChoice]=useState(false);
  const [importBusy,setImportBusy]=useState(false);
  const syncTimerRef=useRef(null);
  const lastSnapshotRef=useRef("");
  const client=useMemo(createSupabaseBrowserClient,[]);
  const activeScope=session?.user?.id?`user:${session.user.id}`:"guest";

  useEffect(()=>{
    if(!client)return;
    let mounted=true;
    client.auth.getSession().then(({data:{session}})=>{
      if(!mounted)return;
      setSession(session);
      setAuthReady(true);
      if(session){
        setCloudStatus("동기화 준비");
        setCloudMessage("클라우드 데이터를 불러오는 중");
      }
    });
    const {data:{subscription}}=client.auth.onAuthStateChange((_event,nextSession)=>{
      if(mounted)setSession(nextSession);
    });
    return()=>{
      mounted=false;
      subscription.unsubscribe();
    };
  },[client]);

  const loadCloudSnapshot=async(userId)=>{
    if(!client||!userId)return;
    setCloudStatus("syncing");
    setCloudMessage("클라우드 데이터를 불러오는 중");
    const {data,error}=await client.from(SUPABASE_TABLE).select("planner,records,updated_at").eq("user_id",userId).maybeSingle();
    if(error){
      setCloudStatus("error");
      setCloudMessage(error.message);
      return;
    }
    const accountScope=`user:${userId}`;
    const accountLocalSnapshot=readLocalSnapshot(accountScope);
    if(data){
      const snapshot={planner:data.planner||{},records:Array.isArray(data.records)?data.records:[]};
      writeLocalSnapshot(accountScope,snapshot);
      lastSnapshotRef.current=JSON.stringify(snapshot);
      setCloudMessage(data.updated_at?`마지막 클라우드 저장 ${new Date(data.updated_at).toLocaleString("ko-KR")}`:"클라우드 데이터 로드 완료");
      setCloudStatus("synced");
      setShowImportChoice(false);
    }else if(hasSnapshotContent(accountLocalSnapshot)){
      await saveCloudSnapshot(accountLocalSnapshot,userId,true);
      setCloudStatus("synced");
      setCloudMessage("이 브라우저에 저장된 같은 계정 데이터를 클라우드에 연결했습니다.");
      setShowImportChoice(false);
    }else{
      const legacySnapshot=readLegacySnapshot();
      clearLocalSnapshot(accountScope);
      lastSnapshotRef.current="";
      if(hasSnapshotContent(legacySnapshot)){
        setCloudStatus("synced");
        setCloudMessage("새 계정입니다. 기존 이 브라우저 데이터는 가져올지 선택해주세요.");
        setShowImportChoice(true);
      }else{
        setCloudStatus("synced");
        setCloudMessage("새 계정입니다. 빈 상태에서 시작합니다.");
        setShowImportChoice(false);
      }
    }
    setAppVersion(v=>v+1);
  };

  const saveCloudSnapshot=async(snapshot,forcedUserId,isImmediate=false)=>{
    const userId=forcedUserId||session?.user?.id;
    if(!client||!userId)return;
    const runSave=async()=>{
      setCloudStatus("syncing");
      const payload={user_id:userId,planner:snapshot.planner||{},records:snapshot.records||[],updated_at:new Date().toISOString()};
      const {error}=await client.from(SUPABASE_TABLE).upsert(payload);
      if(error){
        setCloudStatus("error");
        setCloudMessage(error.message);
        return;
      }
      setCloudStatus("synced");
      setCloudMessage(`마지막 자동 저장 ${new Date().toLocaleString("ko-KR")}`);
    };
    if(isImmediate){
      lastSnapshotRef.current=JSON.stringify(snapshot);
      await runSave();
      return;
    }
    const serialized=JSON.stringify(snapshot);
    if(serialized===lastSnapshotRef.current)return;
    lastSnapshotRef.current=serialized;
    if(syncTimerRef.current)clearTimeout(syncTimerRef.current);
    syncTimerRef.current=setTimeout(runSave,800);
  };

  useEffect(()=>{
    if(session?.user?.id)loadCloudSnapshot(session.user.id);
  },[session?.user?.id]);

  useEffect(()=>()=>{if(syncTimerRef.current)clearTimeout(syncTimerRef.current);},[]);

  const handleCloudAuth=async e=>{
    e.preventDefault();
    if(!client)return;
    setAuthBusy(true);
    setAuthError("");
    setAuthMessage("");
    const credentials={email:authEmail.trim(),password:authPassword};
    const result=authMode==="signup"
      ? await client.auth.signUp(credentials)
      : await client.auth.signInWithPassword(credentials);
    setAuthBusy(false);
    if(result.error){
      setAuthError(result.error.message);
      return;
    }
    if(authMode==="signup"&&!result.data.session){
      setAuthMessage("회원가입 메일을 확인한 뒤 로그인해주세요.");
      return;
    }
    setAuthPassword("");
    setAuthMessage(authMode==="signup"?"회원가입 및 로그인 완료":"로그인 완료");
  };

  const handleGoogleLogin=async()=>{
    if(!client)return;
    setAuthBusy(true);
    setAuthError("");
    const redirectTo=`${window.location.origin}${window.location.pathname}`;
    const {error}=await client.auth.signInWithOAuth({
      provider:"google",
      options:{redirectTo}
    });
    if(error){
      setAuthBusy(false);
      setAuthError(error.message);
    }
  };

  const handleCloudLogout=async()=>{
    if(!client)return;
    await client.auth.signOut();
    setSession(null);
    setShowImportChoice(false);
    setCloudStatus("연결 대기");
    setCloudMessage("로그인 필요");
  };

  const setupCard=(
    <div className="card" style={{maxWidth:760,margin:"28px auto 18px",padding:"22px 20px",border:`1px solid ${C.orange}44`}}>
      <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:8}}>Supabase 설정이 필요합니다</div>
      <div style={{fontSize:13,color:C.muted,lineHeight:1.7,marginBottom:14}}>
        상단의 <code>SUPABASE_URL</code> 과 <code>SUPABASE_ANON_KEY</code> 를 본인 프로젝트 값으로 채우면, 같은 계정으로 로그인한 여러 기기에서 데이터를 자동으로 불러옵니다.
      </div>
      <div style={{fontSize:12,color:C.muted,marginBottom:8}}>테이블 생성 SQL</div>
      <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-word",background:"#12141c",border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",fontSize:11.5,color:C.text,lineHeight:1.6}}>
{`create table if not exists public.${SUPABASE_TABLE} (
  user_id uuid primary key references auth.users(id) on delete cascade,
  planner jsonb not null default '{}'::jsonb,
  records jsonb not null default '[]'::jsonb,
  updated_at timestamptz not null default now()
);

alter table public.${SUPABASE_TABLE} enable row level security;

create policy "own row select" on public.${SUPABASE_TABLE}
for select using (auth.uid() = user_id);

create policy "own row insert" on public.${SUPABASE_TABLE}
for insert with check (auth.uid() = user_id);

create policy "own row update" on public.${SUPABASE_TABLE}
for update using (auth.uid() = user_id);`}
      </pre>
    </div>
  );

  const importLegacyToAccount=async()=>{
    if(!session?.user?.id)return;
    setImportBusy(true);
    const snapshot=readLegacySnapshot();
    writeLocalSnapshot(`user:${session.user.id}`,snapshot);
    await saveCloudSnapshot(snapshot,session.user.id,true);
    setShowImportChoice(false);
    setImportBusy(false);
    setCloudMessage("기존 이 브라우저 데이터를 현재 계정으로 가져왔습니다.");
    setAppVersion(v=>v+1);
  };

  const startFreshAccount=()=>{
    if(!session?.user?.id)return;
    clearLocalSnapshot(`user:${session.user.id}`);
    setShowImportChoice(false);
    setCloudMessage("새 계정은 빈 데이터로 시작합니다.");
    setAppVersion(v=>v+1);
  };

  return(<>
    {!client&&setupCard}

    {client&&!authReady&&<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div className="card" style={{width:"100%",maxWidth:420,padding:"28px 24px",textAlign:"center"}}>클라우드 세션을 확인하는 중입니다...</div>
    </div>}

    {client&&authReady&&!session&&<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:"radial-gradient(circle at top,#1b2236 0%,#0f1117 58%)"}}>
      <div className="card" style={{width:"100%",maxWidth:430,padding:"28px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
        <div style={{fontSize:12,fontWeight:700,color:C.teal,letterSpacing:"0.08em",marginBottom:10}}>CLOUD SYNC</div>
        <div style={{fontSize:26,fontWeight:800,color:C.text,marginBottom:10,lineHeight:1.25}}>계정 로그인으로 바로 시작</div>
        <p style={{fontSize:13,color:C.muted,lineHeight:1.6,marginBottom:18}}>같은 Supabase 계정으로 로그인하면 여러 기기에서 데이터가 자동으로 동기화됩니다. 계정마다 데이터는 완전히 분리됩니다.</p>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <button className="btn-sm" onClick={()=>setAuthMode("signin")} style={{flex:1,padding:"10px 12px",background:authMode==="signin"?C.teal+"18":"transparent",borderColor:authMode==="signin"?C.teal+"44":C.border,color:authMode==="signin"?C.teal:C.muted}}>로그인</button>
          <button className="btn-sm" onClick={()=>setAuthMode("signup")} style={{flex:1,padding:"10px 12px",background:authMode==="signup"?C.accent+"18":"transparent",borderColor:authMode==="signup"?C.accent+"44":C.border,color:authMode==="signup"?C.accent:C.muted}}>회원가입</button>
        </div>
        <button className="btn-primary" type="button" onClick={handleGoogleLogin} style={{marginBottom:12,background:"linear-gradient(135deg,#ffffff,#dbe4ff)",color:"#111827"}}>
          {authBusy?"Google로 이동 중...":"Google로 계속하기"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"2px 0 14px"}}>
          <div style={{height:1,background:C.border,flex:1}}/>
          <span style={{fontSize:11,color:C.dim}}>또는 이메일로</span>
          <div style={{height:1,background:C.border,flex:1}}/>
        </div>
        <form onSubmit={handleCloudAuth}>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>이메일</div>
          <input type="email" className="ti" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} placeholder="name@example.com" autoComplete="email" style={{marginBottom:12}}/>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>비밀번호</div>
          <input type="password" className="ti" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} placeholder="클라우드 계정 비밀번호" autoComplete={authMode==="signup"?"new-password":"current-password"} style={{marginBottom:12}}/>
          {authError&&<div style={{marginBottom:12,padding:"10px 12px",borderRadius:10,background:"rgba(248,113,113,0.12)",border:"1px solid rgba(248,113,113,0.25)",fontSize:12,color:C.red}}>{authError}</div>}
          {authMessage&&<div style={{marginBottom:12,padding:"10px 12px",borderRadius:10,background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.25)",fontSize:12,color:C.green}}>{authMessage}</div>}
          <button className="btn-primary" type="submit">{authBusy?(authMode==="signup"?"가입 중...":"로그인 중..."):(authMode==="signup"?"회원가입 후 시작":"로그인 후 시작")}</button>
        </form>
      </div>
    </div>}

    {showImportChoice&&session&&<div style={{position:"fixed",inset:0,zIndex:20,background:"rgba(15,17,23,0.78)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div className="card" style={{width:"100%",maxWidth:460,padding:"24px 22px",boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
        <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:8}}>기존 이 브라우저 데이터가 있습니다</div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.7,marginBottom:18}}>
          이 계정은 새로 만든 계정이므로 기본값은 빈 데이터입니다. 원하면 이 브라우저에 남아 있는 기존 로컬 데이터를 현재 계정으로 가져올 수 있습니다.
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-primary" onClick={importLegacyToAccount} disabled={importBusy}>{importBusy?"가져오는 중...":"기존 데이터 가져오기"}</button>
          <button type="button" onClick={startFreshAccount} style={{padding:"10px 18px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>빈 상태로 시작</button>
        </div>
      </div>
    </div>}

    {client&&authReady&&session&&!showImportChoice&&<App
      key={`cloud-${appVersion}-${session.user.id}`}
      storageScope={activeScope}
      onCloudSnapshotChange={saveCloudSnapshot}
      onCloudRefresh={()=>loadCloudSnapshot(session.user.id)}
      onCloudLogout={handleCloudLogout}
      cloudStatus={cloudStatus}
      cloudEmail={session.user.email}
      cloudMessage={cloudMessage}
    />}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<AccessShell/>);
</script>
</body>
</html>
